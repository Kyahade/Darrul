<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

  body {
    height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #ffe6f0;
    font-family: 'Comic Neue', cursive;
    overflow: hidden;
    position: relative;
  }

  h1 {
    font-size: 2.5rem;
    color: #ff0066;
    text-shadow: 2px 2px 8px #ff99cc;
    animation: pulse 1s infinite;
    margin-bottom: 40px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .buttons {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: white;
    background: linear-gradient(145deg, #ff6699, #ff3399);
    box-shadow: 0 5px 15px rgba(255,0,153,0.4);
    transition: all 0.3s ease;
    position: relative;
  }

  button:hover {
    transform: scale(1.1) rotate(-3deg);
    box-shadow: 0 8px 20px rgba(255,0,153,0.6);
  }

  /* Floating hearts */
  .heart {
    width: 20px;
    height: 20px;
    position: absolute;
    background: red;
    transform: rotate(45deg);
    animation: floatUp 4s linear infinite;
    z-index: 0;
  }

  .heart::before, .heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart::before { top: -10px; left: 0; }
  .heart::after { left: 10px; top: 0; }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-600px) rotate(45deg); opacity: 0; }
  }

</style>
</head>
<body>

<h1>Do you love me? ❤️</h1>
<div class="buttons">
  <button id="yesBtn">Yes 😍</button>
  <button id="noBtn">No 😅</button>
</div>

<script>
  const noBtn = document.getElementById('noBtn');

  function moveNoButton() {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.position = 'absolute';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
  }

  // Desktop hover
  noBtn.addEventListener('mouseover', moveNoButton);

  // Mobile touch
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    moveNoButton();
  }, {passive:false});

  document.getElementById('yesBtn').addEventListener('click', () => {
    alert("I knew it! 😘 I love you too!");
  });

  // Floating hearts
  setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = 3 + Math.random() * 2 + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
</script>
</body>
</html>
